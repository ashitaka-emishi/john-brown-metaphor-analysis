project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - working-paper.qmd
    - workflow.qmd
    - evidence.qmd
    - publication-audit.qmd
    - reproducibility-report.qmd
    - reviews/*.qmd
  resources:
    - outputs/**

website:
  title: "John Brown Metaphor Analysis"
  description: "A governed AI-assisted scholarly research project examining John Brown's metaphor, biblical allusion, religious typology, violence, failure, and death."
  navbar:
    left:
      - text: "Home"
        href: index.html
      - text: "Paper"
        href: working-paper.html
      - text: "Workflow"
        href: workflow.html
      - text: "Evidence"
        href: evidence.html
      - text: "Reviews"
        href: reviews/
      - text: "Reports"
        menu:
          - text: "Publication Audit"
            href: publication-audit.html
          - text: "Reproducibility Report"
            href: reproducibility-report.html
  page-footer:
    center: "A governed source-grounded scholarly research project"

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    link-external-newwindow: true

execute:
  freeze: auto
